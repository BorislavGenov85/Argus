<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argus — Scan History</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c0f;
    --bg-1: #0f1217;
    --bg-2: #151820;
    --bg-3: #1c2028;
    --border: #1e2530;
    --border-dim: #151820;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --accent: #22d3ee;
    --accent-dim: rgba(34,211,238,0.12);
    --accent-glow: rgba(34,211,238,0.06);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251,191,36,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --orange: #fb923c;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── NAV ── */
  nav {
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-brand {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-brand::before {
    content: '◈';
    font-size: 14px;
  }

  .nav-links { display: flex; gap: 4px; align-items: center; }

  .nav-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .nav-link:hover { color: var(--text); background: var(--bg-2); }
  .nav-link.active { color: var(--accent); background: var(--accent-dim); }

  /* ── MAIN ── */
  main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .page-title {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .page-subtitle {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 4px;
  }

  .stats-bar {
    display: flex;
    gap: 2px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .stat-pill {
    padding: 6px 14px;
    border-radius: 5px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill strong { color: var(--text); font-weight: 600; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }

  .search-box {
    flex: 1;
    max-width: 320px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  .filter-btn {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .spacer { flex: 1; }

  .btn-new-scan {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s;
  }

  .btn-new-scan:hover { opacity: 0.85; }

  /* ── TABLE ── */
  .scan-table-wrap {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead {
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border-dim);
    cursor: pointer;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-2); }

  td {
    padding: 12px 16px;
    font-size: 12px;
    vertical-align: middle;
  }

  .target-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .target-icon {
    width: 32px;
    height: 32px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .target-name {
    color: var(--text);
    font-weight: 500;
    font-size: 13px;
  }

  .target-id {
    color: var(--text-muted);
    font-size: 10px;
    margin-top: 1px;
  }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge::before { content: '●'; font-size: 7px; }

  .badge-completed { background: var(--green-dim); color: var(--green); }
  .badge-running { background: var(--accent-dim); color: var(--accent); animation: pulse-badge 2s infinite; }
  .badge-failed { background: var(--red-dim); color: var(--red); }
  .badge-stopped { background: var(--yellow-dim); color: var(--yellow); }
  .badge-pending { background: var(--bg-3); color: var(--text-muted); border: 1px solid var(--border); }
  .badge-awaiting_domains { background: var(--purple-dim); color: var(--purple); }
  .badge-stopping { background: var(--yellow-dim); color: var(--yellow); }

  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Findings pills */
  .findings-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .finding-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
  }

  .pill-port { background: var(--accent-dim); color: var(--accent); }
  .pill-dir { background: var(--green-dim); color: var(--green); }
  .pill-vhost { background: var(--purple-dim); color: var(--purple); }
  .pill-dns { background: var(--yellow-dim); color: var(--yellow); }

  /* Modules */
  .modules-cell {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .module-tag {
    padding: 2px 6px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Duration */
  .duration { color: var(--text-dim); font-size: 11px; }

  /* Date */
  .date-cell { color: var(--text-dim); font-size: 11px; }
  .date-cell .rel { color: var(--text-muted); font-size: 10px; display: block; }

  /* Row actions */
  .row-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  tbody tr:hover .row-actions { opacity: 1; }

  .action-btn {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .action-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .action-btn.danger:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

  /* Empty state */
  .empty-state {
    padding: 80px 32px;
    text-align: center;
    color: var(--text-muted);
  }

  .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; }
  .empty-state p { font-size: 13px; }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--text);
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">ARGUS</a>
  <div class="nav-links">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/scans/" class="nav-link active">Scan History</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1 class="page-title">Scan History</h1>
      <p class="page-subtitle">All reconnaissance sessions</p>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <div class="stats-bar" id="statsBar">
        <div class="stat-pill">Total <strong id="statTotal">—</strong></div>
        <div class="stat-pill">Completed <strong id="statCompleted">—</strong></div>
        <div class="stat-pill">Running <strong id="statRunning">—</strong></div>
        <div class="stat-pill">Failed <strong id="statFailed">—</strong></div>
      </div>
      <a href="/" class="btn-new-scan">＋ New Scan</a>
    </div>
  </div>

  <div class="filters">
    <input type="text" class="search-box" placeholder="Filter by target..." id="searchInput">
    <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter(this,'completed')">✓ Completed</button>
    <button class="filter-btn" data-filter="running" onclick="setFilter(this,'running')">⟳ Running</button>
    <button class="filter-btn" data-filter="failed" onclick="setFilter(this,'failed')">✕ Failed</button>
    <div class="spacer"></div>
    <button class="filter-btn" onclick="loadScans()" title="Refresh">↻ Refresh</button>
  </div>

  <div class="scan-table-wrap">
    <table>
      <thead>
        <tr>
          <th>Target</th>
          <th>Status</th>
          <th>Findings</th>
          <th>Modules</th>
          <th>Duration</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="scanTableBody">
        <tr>
          <td colspan="7">
            <div class="empty-state">
              <div class="empty-icon">◌</div>
              <p>Loading scan history...</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let allScans = [];
let currentFilter = 'all';

function getCsrf() {
  return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('csrftoken='))?.split('=')[1]||'';
}

async function loadScans() {
  const resp = await fetch('/api/scans/');
  const data = await resp.json();
  allScans = data.scans;
  updateStats();
  renderTable();
}

function updateStats() {
  document.getElementById('statTotal').textContent = allScans.length;
  document.getElementById('statCompleted').textContent = allScans.filter(s=>s.status==='completed').length;
  document.getElementById('statRunning').textContent = allScans.filter(s=>['running','awaiting_domains'].includes(s.status)).length;
  document.getElementById('statFailed').textContent = allScans.filter(s=>s.status==='failed').length;
}

function setFilter(btn, filter) {
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderTable();
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let scans = allScans;

  if (currentFilter !== 'all') {
    if (currentFilter === 'running') {
      scans = scans.filter(s=>['running','awaiting_domains','stopping'].includes(s.status));
    } else {
      scans = scans.filter(s=>s.status === currentFilter);
    }
  }

  if (search) {
    scans = scans.filter(s=>s.target.toLowerCase().includes(search));
  }

  const tbody = document.getElementById('scanTableBody');

  if (!scans.length) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <div class="empty-icon">◌</div>
        <p>No scans found</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = scans.map(s => {
    const statusClass = `badge-${s.status.replace('_','-')}`;
    const statusLabel = s.status.replace(/_/g,' ');

    const dur = s.duration_seconds !== null
      ? formatDuration(s.duration_seconds)
      : (s.status === 'running' ? '<span style="color:var(--accent)">running...</span>' : '—');

    const created = formatDate(s.created_at);
    const relDate = timeAgo(s.created_at);

    const modules = (s.modules_executed||[]).map(m=>
      `<span class="module-tag">${m}</span>`
    ).join('');

    const findings = `
      ${s.ports_count ? `<span class="finding-pill pill-port">${s.ports_count} ports</span>` : ''}
      ${s.dirs_count ? `<span class="finding-pill pill-dir">${s.dirs_count} dirs</span>` : ''}
      ${s.vhosts_count ? `<span class="finding-pill pill-vhost">${s.vhosts_count} vhosts</span>` : ''}
      ${s.dns_count ? `<span class="finding-pill pill-dns">${s.dns_count} dns</span>` : ''}
      ${!s.ports_count && !s.dirs_count && !s.vhosts_count && !s.dns_count ? '<span style="color:var(--text-muted);font-size:11px;">none</span>' : ''}
    `;

    return `<tr onclick="window.location='/scan/${s.id}/'">
      <td>
        <div class="target-cell">
          <div class="target-icon">🎯</div>
          <div>
            <div class="target-name">${escHtml(s.target)}</div>
            <div class="target-id">#${s.id}</div>
          </div>
        </div>
      </td>
      <td><span class="badge ${statusClass}">${statusLabel}</span></td>
      <td><div class="findings-row">${findings}</div></td>
      <td><div class="modules-cell">${modules || '<span style="color:var(--text-muted);font-size:11px;">—</span>'}</div></td>
      <td class="duration">${dur}</td>
      <td class="date-cell">${created}<span class="rel">${relDate}</span></td>
      <td onclick="event.stopPropagation()">
        <div class="row-actions">
          <a href="/scan/${s.id}/" class="action-btn">View</a>
          <button class="action-btn danger" onclick="deleteScan(${s.id})">Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function deleteScan(id) {
  if (!confirm('Delete this scan and all its findings?')) return;
  await fetch(`/scan/${id}/delete/`, {method:'POST', headers:{'X-CSRFToken':getCsrf()}});
  allScans = allScans.filter(s=>s.id!==id);
  updateStats();
  renderTable();
  showToast('Scan deleted');
}

function formatDuration(secs) {
  if (secs < 60) return `${secs}s`;
  const m = Math.floor(secs/60);
  const s = secs % 60;
  return s > 0 ? `${m}m ${s}s` : `${m}m`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) +
    ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

document.getElementById('searchInput').addEventListener('input', renderTable);

// Auto-refresh if any running scans
function scheduleRefresh() {
  const hasRunning = allScans.some(s=>['running','awaiting_domains','stopping','pending'].includes(s.status));
  if (hasRunning) setTimeout(()=>loadScans().then(scheduleRefresh), 5000);
}

loadScans().then(scheduleRefresh);
</script>
</body>
</html>
